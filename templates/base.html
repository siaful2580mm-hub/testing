<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}পিকঘর | নান্দনিক সংগ্রহশালা{% endblock %}</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hind Siliguri',sans-serif;background:#Faf8f5}

/* NAVBAR */
.navbar{
    position:sticky;
    top:0;
    z-index:1050;
    background:#0a0b10;
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    border-bottom:1px solid rgba(255,215,0,.2)
}

.logo a{
    color:#fff;
    font-size:1.5rem;
    font-weight:700;
    text-decoration:none;
}
.logo span{color:#FFD700}

/* NAV LINKS */
.nav-links{
    display:flex;
    gap:18px;
    align-items:center;
}

.nav-links a{
    color:#ddd;
    text-decoration:none;
    font-size:.95rem;
    display:flex;
    align-items:center;
}
.nav-links a i{margin-right:6px}

.nav-btn{
    background:#FFD700;
    color:#000!important;
    padding:6px 14px;
    border-radius:20px;
}

/* HAMBURGER */
.hamburger{
    display:none;
    flex-direction:column;
    cursor:pointer;
}
.hamburger span{
    width:25px;height:3px;background:#FFD700;margin:4px 0;
}

/* MOBILE */
@media(max-width:992px){

.hamburger{display:flex}

.nav-links{
    position:fixed;
    top:0;
    right:-100%;
    width:260px;
    height:100vh;
    background:#0a0b10;
    flex-direction:column;
    align-items:flex-start;
    padding-top:70px;
    transition:.4s;
    z-index:1040;
}

.nav-links.active{right:0}

.nav-links a{
    width:100%;
    padding:14px 25px;
    border-bottom:1px solid rgba(255,255,255,.05)
}

/* overlay */
.overlay{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
    opacity:0;
    visibility:hidden;
    transition:.3s;
}

.overlay.active{
    opacity:1;
    visibility:visible;
}

}

/* CONTAINER */
.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

/* FOOTER */
.footer{
    background:#0a0b10;
    color:#aaa;
    margin-top:60px;
    padding:40px 20px;
    text-align:center;
    border-top:2px solid #FFD700;
}
</style>

{% block head %}{% endblock %}
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">
        <a href="/">📸 পিক<span>ঘর</span></a>
    </div>

    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="nav-links" id="navMenu">
        <a href="/"><i class="fa fa-home"></i> হোম</a>
        <a href="/c/image"><i class="fa fa-image"></i> ছবি</a>
        <a href="/c/story"><i class="fa fa-book"></i> গল্প</a>
        <a href="/c/font"><i class="fa fa-font"></i> ফন্ট</a>

        {% if session.get('user') %}
        <a href="/upload" class="nav-btn"><i class="fa fa-upload"></i> আপলোড</a>
        <a href="/logout"><i class="fa fa-sign-out"></i> লগআউট</a>
        {% else %}
        <a href="/login"><i class="fa fa-sign-in"></i> লগইন</a>
        <a href="/signup" class="nav-btn">রেজিস্ট্রেশন</a>
        {% endif %}
    </div>
</nav>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- CONTENT -->
<div class="container">
    {% block content %}{% endblock %}
</div>

<!-- FOOTER -->
<footer class="footer">
    © ২০২৬ পিকঘর — All rights reserved
</footer>

<!-- JS -->
<script>
const hamburger=document.getElementById("hamburger");
const navMenu=document.getElementById("navMenu");
const overlay=document.getElementById("overlay");

hamburger.onclick=()=>{
    navMenu.classList.toggle("active");
    overlay.classList.toggle("active");
}

overlay.onclick=()=>{
    navMenu.classList.remove("active");
    overlay.classList.remove("active");
}
</script>

</body>
</html>
